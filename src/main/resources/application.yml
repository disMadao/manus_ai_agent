    # 临时注释掉，便于大家开发调试和部署（实际需要启动 PgVector 数据库）
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.manus.aiagent.controller,com.manus.aiagent.gateway.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
# searchAPI
search-api:
  # 需要替换为你自己的 key
  api-key: your-search-api-key
# Gateway 外部渠道配置（QQ Bot / 飞书 Bot）
gateway:
#  qq:
#    # QQ 开放平台 https://q.qq.com 创建机器人后获取
#    app-id: your-qq-app-id
#    app-secret: your-qq-app-secret
#    token: your-qq-token
#  feishu:
#    # 飞书开放平台 https://open.feishu.cn 创建应用后获取
#    app-id: your-feishu-app-id
#    app-secret: your-feishu-app-secret
#    verification-token: your-feishu-verification-token
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG