    #      api-key: your-dashscope-api-key
    #      chat:
    #        options:
    #          model: qwen-plus
    #    ollama:
    #      base-url: http://localhost:11434
    #      chat:
    #        model: gemma3:1b
    # 临时注释掉，便于大家开发调试和部署（实际需要启动 MCP 服务）
    #    mcp:
    #     client:
    #       sync:
    #         timeout: 60000  # 增加到60秒（毫秒）
